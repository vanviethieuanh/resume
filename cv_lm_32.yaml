    Projects:
      - name: UnitD
        start_date: 2026-02
        end_date: present
        summary: >
          Designed in response to inefficiencies in running multiple internal microservices
          with varying usage patterns (daily, weekly, seasonal). Existing container-based
          approaches introduced trade-offs between cost (always-on containers) and latency
          (cold-start delays affecting user experience and integrations). Proposed a
          systemd-based approach using a centralized VM to optimize cost and reliability,
          leading to the development of a declarative configuration language for system-level
          infrastructure.
        highlights:
          - Designed a declarative configuration language (HCL-based) for systemd-based infrastructure.
          - Built a compiler pipeline (parse → validate → resolve → render → apply).
          - Enabled secure secret integration and deterministic configuration rendering.
          - Replaced ad-hoc Ansible-based setups with structured, validated configurations.
          - Planned Language Server Protocol (LSP) support for validation and developer experience.
          - Explored system configuration as a compilation problem rather than orchestration.

      - name: Web Novel Audio Pipeline (Homelab)
        start_date: 2025-01
        end_date: present
        summary: >
          Designed a high-performance pipeline to convert large-scale Chinese web novel datasets
          into Vietnamese audiobooks and multimedia content, focusing on efficient storage,
          concurrency, and multi-stage data processing.
        highlights:
          - Designed data pipelines to process large-scale web novel datasets (≈4 million chapters).
          - Built an efficient storage system combining SQLite and Zstandard compression to optimize read/write performance and disk usage.
          - Developed multi-threaded processing pipelines in Rust (crossbeam, rayon) for transformation, translation, and media generation.
          - Implemented caching mechanisms to avoid redundant transformations based on content hashing.
          - Managed concurrent TTS generation and FFmpeg-based audio/video composition workflows.
          - Built and operated a hybrid cluster (local machines + cloud VM) using K3s, enabling distributed workloads and experimentation with container orchestration.

      - name: Iron Spider
        start_date: 2025-06
        end_date: present
        summary: >
          Designed a strongly-typed, modular web scraping framework in Rust inspired by
          Scrapy, focusing on extensibility, pipeline-based data processing, and
          concurrent execution.
        highlights:
          - Designed a trait-based architecture for pluggable components (spiders, pipelines, schedulers, downloaders).
          - Implemented a pipeline system for post-processing scraped data with configurable execution order and type safety.
          - Built a concurrent scraping engine with configurable scheduling, request handling, and error management.
          - Developed a terminal-based UI (TUI) for real-time monitoring of logs, request statistics, and system performance.
          - Enabled flexible configuration to instantiate and compose multiple spiders and pipelines dynamically.
          - Modeled scraping workflows as composable, type-safe pipelines enabling flexible data extraction and transformation.

