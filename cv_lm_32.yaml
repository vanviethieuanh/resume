          - Designed and implemented Terraform modules to standardize infrastructure provisioning across multiple teams.
          - Solved cross-team infrastructure challenges including networking, identity management, and secure service integration.
          - Supported system integration across heterogeneous components (HTTP services, event-driven systems).
          - Worked on infrastructure at scale across 200+ subscriptions using Landing Zone architecture.

