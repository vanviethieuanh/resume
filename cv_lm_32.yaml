          - Built asynchronous data processing tools in Python to synchronize large-scale role mappings into Keycloak.
          - Worked with identity and access management systems (SSO, OIDC) to integrate role-based authorization across services.
          - Improved maintainability of role configuration by introducing structured naming and mapping conventions.

