          - Define host-scoped execution model with no shared state or cross-host coordination.
          - Enforce strict validation rules for conflicts, references, and configuration correctness.
          - Ensure deterministic output with stable ordering and reproducible rendering.
          - Avoid traditional orchestration patterns (no agents, no control plane, no reconciliation loops).
          - Structure implementation in Go with clear separation between AST, IR, and rendered output.
          - Plan Language Server Protocol (LSP) support for navigation, validation, and better developer experience.

