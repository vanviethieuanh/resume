      # NOTE:
      # Ongoing project to design a declarative compiler for systemd-based
      # infrastructure. Focus on treating system configuration as a compilation
      # problem instead of orchestration. Defines a full configuration language
      # (HCL-based) with strict mapping to systemd concepts. Emphasis on
      # determinism, validation, and developer experience (LSP support).
      - company: UnitD
        position: Developer
        start_date: 2026-02
        end_date: present

