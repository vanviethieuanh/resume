design:
  theme: engineeringclassic

  page:
    size: a4
    top_margin: 0.7cm
    bottom_margin: 0.7cm
    left_margin: 1.0cm
    right_margin: 1.0cm
    show_footer: false
    show_top_note: true

  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    connections: rgb(28, 28, 30)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)

  typography:
    line_spacing: 0.6em
    alignment: justified
    date_and_location_column_alignment: right

    font_family:
      body: Lato
      name: Libertinus Serif
      connections: Lato
      section_titles: Libertinus Serif

    font_size:
      body: 9.6pt
      name: 22pt
      headline: 10pt
      connections: 8.5pt
      section_titles: 16pt

    bold:
      name: true
      section_titles: true

    small_caps:
      section_titles: false

  links:
    underline: false
    show_external_link_icon: false

  header:
    alignment: left
    photo_width: 3.5cm

    space_below_name: 0.7cm
    space_below_connections: 0.7cm

    connections:
      show_icons: true
      separator: ""
      space_between_connections: 0.7cm
      phone_number_format: international

  section_titles:
    type: with_partial_line
    line_thickness: 0.5pt
    space_above: 0.75cm
    space_below: 0.3cm

  sections:
    allow_page_break: true
    space_between_regular_entries: 1.2em
    show_time_spans_in: []

  entries:
    date_and_location_width: 3.8cm
    side_space: 0.05cm
    space_between_columns: 0.08cm
    allow_page_break: true
    short_second_row: false

    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0cm
      space_above: 0.1cm
      space_between_items: 0.08cm
      space_between_bullet_and_text: 0.3em

  templates:
    one_line_entry:
      main_column: "**LABEL:** DETAILS"

    education_entry:
      main_column: |-
        **INSTITUTION**, AREA -- LOCATION
        SUMMARY
        HIGHLIGHTS
      degree_column: "**DEGREE**"
      date_and_location_column: DATE

    normal_entry:
      main_column: |-
        **NAME** -- **LOCATION**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE

    experience_entry:
      main_column: |-
        **POSITION**, COMPANY -- LOCATION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE

    publication_entry:
      main_column: |-
        **TITLE**
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
